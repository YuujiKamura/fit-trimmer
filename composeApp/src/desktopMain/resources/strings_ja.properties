privacy_title=プライバシーと外部通信について
privacy_message=本アプリはオフライン動作を基本としていますが、以下の便利な機能を提供するために必要最小限の外部通信を行います。
privacy_item_osm=・OpenStreetMap (Nominatim API): 緯度経度から道路名・地名テロップを自動取得するためにGPS座標を送信します。
privacy_item_gsi=・国土地理院ベクトルタイル: 日本国内での正確な道路カテゴリー判定のためにタイルデータをロードします。
privacy_item_github=・GitHub API: アプリ起動時に新しいアップデートが存在するか確認します。
privacy_agree=同意してアプリを起動する

storage_policy_title=ローカルデータの保存と非破壊処理について
storage_policy_message=本アプリは快適な編集体験と作業の自動復元のために、お使いのPC内で以下のローカルデータ処理を行います。
storage_policy_item_trim=・非破壊データ処理: FITデータ全体はメモリ上に保持され、動画に合わせて動的に切り出されます。元のファイルが直接書き換えられることはありません。
storage_policy_item_cache=・自動保存キャッシュ: 次回起動時に前回の状態を自動復元するため、選択したファイルパスやアライメント設定をローカルのアプリデータ領域に自動保存します。
storage_policy_item_offline=・完全ローカル処理: 動画のエンコードやHUDの合成処理はすべてお使いのPC内で完結し、映像やFITファイルが外部サーバーに送信されることは一切ありません。

