privacy_title=Privacy & Network Connections
privacy_message=While this app operates primarily offline, it performs minimal external network requests to provide the following features:
privacy_item_osm=- OpenStreetMap (Nominatim API): Sends GPS coordinates to automatically detect and display road name overlays.
privacy_item_gsi=- Geospatial Information Authority of Japan (GSI): Loads tile data to perform accurate road categorization in Japan.
privacy_item_github=- GitHub API: Checks for the latest app updates upon startup.
privacy_agree=Agree & Start App

storage_policy_title=Local Storage & Data Processing
storage_policy_message=To ensure a seamless editing experience and automatic work recovery, the app performs the following local data operations:
storage_policy_item_trim=- Non-destructive trim: The entire FIT file is loaded in memory and dynamically aligned with the video. Your original files are never altered.
storage_policy_item_cache=- Auto-save cache: File paths, alignment offsets, and HUD configurations are automatically saved locally on your computer to restore your session upon next launch.
storage_policy_item_offline=- 100% Local processing: Video encoding and HUD rendering are performed entirely on your PC. Your videos and activity logs are never uploaded to any external server.
