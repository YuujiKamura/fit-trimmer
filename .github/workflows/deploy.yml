name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build with Gradle
        run: ./gradlew :shared-core:wasmJsBrowserDistribution

      - name: Prepare production folder
        run: |
          mkdir -p dist
          cp index.html dist/
          if [ -d "src" ]; then cp -r src dist/; fi

          SEARCH_DIR="shared-core/build/dist/wasmJs/productionExecutable"
          if [ -d "$SEARCH_DIR" ]; then
            cp "$SEARCH_DIR"/*.js dist/ 2>/dev/null || true
            cp "$SEARCH_DIR"/*.wasm dist/ 2>/dev/null || true
          else
            echo "Warning: $SEARCH_DIR not found. Searching elsewhere..."
            find shared-core/build/dist -name "*.js" -exec cp {} dist/ \;
            find shared-core/build/dist -name "*.wasm" -exec cp {} dist/ \;
          fi

          rm -f dist/*.map

          echo "Production folder content:"
          ls -lR dist

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
