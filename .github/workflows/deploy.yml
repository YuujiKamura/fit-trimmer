name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build with Gradle
        run: ./gradlew :shared-core:wasmJsBrowserProductionWebpack

      - name: Prepare production folder
        run: |
          mkdir -p dist
          cp index.html dist/
          cp -r src dist/
          cp shared-core/build/dist/wasmJs/productionExecutable/*.js dist/
          cp shared-core/build/dist/wasmJs/productionExecutable/*.wasm dist/
          # Ensure there are no large map files in the final artifact
          rm -f dist/*.map

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
