name: Build and Release Desktop App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release Windows App
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Desktop Distribution
        run: ./gradlew :composeApp:packageMsi

      - name: List Artifacts
        shell: bash
        run: |
          echo "Listing artifacts in target directory..."
          ls -R composeApp/build/compose/binaries/main/msi || true

      - name: Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            composeApp/build/compose/binaries/main/msi/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
